# ===========================================
# Docker Compose untuk Production Deployment
# Azure Ubuntu 24 Compatible
# ===========================================

version: '3.8'

services:
  # Backend: FastAPI Application
  backend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.backend
    container_name: phishing-backend
    restart: unless-stopped
    networks:
      - app-network
    environment:
      - APP_ENV=production
      - API_V1_STR=/api/v1
      # Secrets should be loaded from .env.production file
    env_file:
      - .env.production
    volumes:
      - backend-data:/app/data  # Untuk quota cache JSON
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend: React Application (served by Nginx)
  frontend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.frontend
    container_name: phishing-frontend
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Reverse Proxy: Nginx (entry point untuk semua traffic)
  reverse-proxy:
    image: nginx:alpine-slim
    container_name: phishing-proxy
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP (redirect to HTTPS)
      - "443:443"  # HTTPS (production)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl-params.conf:/etc/nginx/snippets/ssl-params.conf:ro
      - ./certs:/etc/nginx/certs:ro          # SSL certificates
      - ./logs/nginx:/var/log/nginx          # Log files
    networks:
      - app-network
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

networks:
  app-network:
    driver: bridge
    internal: false  # Allow external access via reverse-proxy only

volumes:
  backend-data:
    driver: local