version: '3.8'

services:
  # ===========================================
  # Backend: FastAPI Application
  # ===========================================
  backend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.backend
    container_name: phishing-backend
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - API_V1_STR=/api/v1
      - PROJECT_NAME=Email Phishing Scanner
      # API Keys - inject from Azure Key Vault or .env
      - GOOGLE_SAFE_BROWSING_API_KEY=${GOOGLE_SAFE_BROWSING_API_KEY}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - URL_THREAT_PROVIDER=${URL_THREAT_PROVIDER:-virustotal}
      - RATE_LIMIT=10/minute
      - DNS_TIMEOUT=5.0
    networks:
      - phishing-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits for Azure
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ===========================================
  # Frontend: React Application (served by Nginx)
  # ===========================================
  frontend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.frontend
    container_name: phishing-frontend
    restart: unless-stopped
    networks:
      - phishing-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Reverse Proxy: Nginx (SSL Termination + Security)
  # ===========================================
  reverse-proxy:
  image: nginx:alpine
  container_name: phishing-proxy
  restart: unless-stopped
  ports:
    - "80:80"
    - "443:443"
  volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    - ./nginx/certs:/etc/nginx/certs:ro
    - ./logs/nginx:/var/log/nginx